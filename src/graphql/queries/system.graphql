query GetSystemHealth {
  systemHealth {
    id
    overallStatus
    uptime
    components {
      name
      status
      responseTime
      errorRate
      lastCheck
      details
      errorMessage
    }
    metrics
    lastCheck
  }
}

query GetNotifications($pagination: PaginationInput) {
  notifications(pagination: $pagination) {
    id
    type
    recipient
    subject
    message
    status
    sentAt
    deliveredAt
    failureReason
    retryCount
    createdAt
  }
}

query GetAuditLogs($pagination: PaginationInput) {
  auditLogs(pagination: $pagination) {
    id
    userId
    action
    resource
    resourceId
    changes
    ipAddress
    createdAt
  }
}

query GetAdminStats {
  adminStats {
    totalUsers
    activeUsers
    totalAlerts
    activeAlerts
    totalStations
    activeStations
    totalNotifications
    recentIngestionLogs {
      id
      source
      status
      recordsProcessed
      recordsFailed
      errorMessage
      startTime
      endTime
      duration
      createdAt
    }
  }
}

query GetUsers($pagination: PaginationInput) {
  users(pagination: $pagination) {
    id
    email
    name
    avatar
    role
    isActive
    createdAt
    updatedAt
  }
}
