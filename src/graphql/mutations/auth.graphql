mutation Login($email: String!, $password: String!) {
  login(email: $email, password: $password) {
    token
    refreshToken
    user {
      id
      email
      name
      avatar
      role
      isActive
      preferences {
        alertTypes
        regions
        emailNotifications
        smsNotifications
        pushNotifications
      }
      createdAt
      updatedAt
    }
    expiresIn
  }
}

mutation Signup($email: String!, $password: String!, $name: String) {
  signup(email: $email, password: $password, name: $name) {
    token
    refreshToken
    user {
      id
      email
      name
      avatar
      role
      isActive
      preferences {
        alertTypes
        regions
        emailNotifications
        smsNotifications
        pushNotifications
      }
      createdAt
      updatedAt
    }
    expiresIn
  }
}

mutation RefreshToken($refreshToken: String!) {
  refreshToken(refreshToken: $refreshToken) {
    token
    refreshToken
    user {
      id
      email
      name
      avatar
      role
      isActive
      preferences {
        alertTypes
        regions
        emailNotifications
        smsNotifications
        pushNotifications
      }
      createdAt
      updatedAt
    }
    expiresIn
  }
}

mutation Logout {
  logout
}

mutation UpdateProfile($name: String, $avatar: String) {
  updateProfile(name: $name, avatar: $avatar) {
    id
    email
    name
    avatar
    role
  }
}

mutation UpdatePreferences(
  $alertTypes: [String!]
  $regions: [String!]
  $emailNotifications: Boolean
  $smsNotifications: Boolean
  $pushNotifications: Boolean
  $theme: String
  $language: String
) {
  updatePreferences(
    alertTypes: $alertTypes
    regions: $regions
    emailNotifications: $emailNotifications
    smsNotifications: $smsNotifications
    pushNotifications: $pushNotifications
    theme: $theme
    language: $language
  ) {
    id
    alertTypes
    regions
    emailNotifications
    smsNotifications
    pushNotifications
  }
}

mutation UpdateUserRole($userId: String!, $role: UserRole!) {
  updateUserRole(userId: $userId, role: $role) {
    id
    email
    name
    role
    isActive
  }
}

mutation ToggleUserActive($userId: String!) {
  toggleUserActive(userId: $userId) {
    id
    email
    name
    role
    isActive
  }
}
