subscription AlertStatusUpdated {
  alertStatusUpdated {
    id
    status
    level
    confidence
    message
    region
    lastUpdated
    isActive
    details {
      anomalyDetected
      gpsTriggered
      satelliteTriggered
      triggeredStations
      recommendation
      estimatedImpactTime
      affectedAreas
      evacuationZones
    }
  }
}

subscription NewGPSReading {
  newGPSReading {
    id
    stationId
    station {
      id
      stationId
      name
      latitude
      longitude
      network
      isActive
    }
    latitude
    longitude
    displacementX
    displacementY
    displacementZ
    magnitude
    quality
    timestamp
    metadata
  }
}

subscription NewSatelliteData {
  newSatelliteData {
    id
    imageUrl
    cloudinaryPublicId
    timestamp
    region
    regionBounds
    regionCenter
    anomalyScore
    metadata {
      satellite
      resolution
      polarization
      processingLevel
      cloudCover
      dataSource
    }
    processingInfo {
      baselineComparison
      anomalyThreshold
      processingTime
      algorithm
    }
  }
}
